<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Payment Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reset & Background Hitam */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: #0a0a0a; 
            overflow: hidden; /* Supaya partikel gak bikin scroll */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            position: relative;
        }

        /* Efek Partikel Uang Melayang */
        .money-particle {
            position: absolute;
            color: #2ecc71;
            font-size: 24px;
            user-select: none;
            pointer-events: none;
            z-index: 0;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Animasi Goyang untuk Card */
        @keyframes wobble {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-1deg); }
            75% { transform: rotate(1deg); }
            100% { transform: rotate(0deg); }
        }

        .payment-card {
            background: #ffffff;
            width: 90%;
            max-width: 400px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            text-align: center;
            z-index: 10;
            animation: wobble 4s ease-in-out infinite; /* Kartu goyang pelan */
        }

        .header { background: #118eea; padding: 25px; color: white; }
        
        .content { padding: 30px 20px; }
        .dana-logo { width: 140px; margin-bottom: 20px; }

        .number-box {
            background: #f8fbff;
            border: 2px dashed #118eea;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .phone-number { font-size: 1.6rem; font-weight: 800; color: #333; display: block; margin-bottom: 15px; }

        /* Efek Button Membesar Saat Klik */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
            margin-bottom: 12px;
            width: 100%;
        }

        .btn:hover { transform: scale(1.05); } /* Membesar saat diarahkan */
        .btn:active { transform: scale(0.95); } /* Mengecil dikit saat ditekan (efek pegas) */

        .btn-copy { background: #e8f4ff; color: #118eea; border: 1px solid #118eea; }
        .btn-dana { background: #118eea; color: #ffffff; box-shadow: 0 4px 15px rgba(17, 142, 234, 0.4); }

        .qris-section { margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
        .qris-img { width: 160px; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="particle-container"></div>

<div class="payment-card">
    <div class="header">
        <h2>Selesaikan Pembayaran</h2>
    </div>

    <div class="content">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/72/Logo_dana_blue.svg" alt="DANA Logo" class="dana-logo">
        
        <div class="number-box">
            <span style="font-size: 0.8rem; color: #666;">NOMOR TUJUAN</span>
            <span class="phone-number" id="targetNumber">087887604016</span>
            
            <button class="btn btn-copy" onclick="copyNum()">
                📋 SALIN NOMOR
            </button>
            
            <a href="https://link.dana.id/qr/8u7g5h3" class="btn btn-dana">
                🚀 BUKA DANA SEKARANG
            </a>
        </div>

        <div class="qris-section">
            <span style="font-size: 0.8rem; color: #999;">ATAU SCAN QRIS</span><br>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=087887604016" class="qris-img" alt="QRIS">
        </div>
    </div>
</div>

<script>
    // Fungsi Salin Nomor
    function copyNum() {
        const num = document.getElementById('targetNumber').innerText;
        navigator.clipboard.writeText(num).then(() => {
            alert("Nomor Berhasil Disalin!");
        });
    }

    // Script Membuat Partikel Uang Melayang
    const container = document.getElementById('particle-container');
    const moneyIcons = ['💵', '💰', '💸', '💎'];

    function createParticle() {
        const particle = document.createElement('div');
        particle.className = 'money-particle';
        particle.innerText = moneyIcons[Math.floor(Math.random() * moneyIcons.length)];
        
        // Posisi random
        particle.style.left = Math.random() * 100 + 'vw';
        // Kecepatan random
        particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
        // Ukuran random
        particle.style.fontSize = (Math.random() * 20 + 15) + 'px';
        
        container.appendChild(particle);

        // Hapus partikel setelah animasi selesai agar tidak berat
        setTimeout(() => {
            particle.remove();
        }, 5000);
    }

    // Buat partikel baru setiap 300ms
    setInterval(createParticle, 300);
</script>

</body>
</html>
